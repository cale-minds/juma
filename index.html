		<script>
		var workspace = Blockly.inject('blocklyDiv', 
		  {toolbox: document.getElementById('toolbox'), 
		  	zoom:
	         {controls: true,
	          wheel: true,
	          startScale: 0.8,
	          maxScale: 3,
	          minScale: 0.3,
	          scaleSpeed: 1.1},
	     		trashcan: true,
	     		sounds: false});

		  Blockly.Xml.domToWorkspace(document.getElementById('startBlocks'), Blockly.mainWorkspace);

		  var autoConnectRules = {
		  	predefinedprefix: [{parentType: 'mapping', inputName: 'mapping', inputKind: 'statement'}],
		  	prefix: [{parentType: 'mapping', inputName: 'mapping', inputKind: 'statement'}],
		  	base: [{parentType: 'mapping', inputName: 'mapping', inputKind: 'statement'}],
		  	triplemap: [{parentType: 'mapping', inputName: 'triplesmap', inputKind: 'statement'}],
		  	tablesqlquery: [{parentType: 'triplemap', inputName: 'logicaltable', inputKind: 'statement'}],
		  	subjectmap: [{parentType: 'triplemap', inputName: 'subjectmap', inputKind: 'statement'}],
		  	class: [{parentType: 'subjectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	subjecttermtype: [{parentType: 'subjectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	subjectgraphtermap: [{parentType: 'subjectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	predicateobjectmap: [{parentType: 'triplemap', inputName: 'predicateobjectmap', inputKind: 'statement'}],
		  	predicatemap: [{parentType: 'predicateobjectmap', inputName: 'ppredicateobjectmap', inputKind: 'statement'}],
		  	predicatetermtype: [{parentType: 'predicatemap', inputName: 'termmap', inputKind: 'statement'}],
		  	objectmap: [{parentType: 'predicateobjectmap', inputName: 'opredicateobjectmap', inputKind: 'statement'}],
		  	parenttriplesmap: [{parentType: 'predicateobjectmap', inputName: 'opredicateobjectmap', inputKind: 'statement'}],
		  	objecttermtype: [{parentType: 'objectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	datatype: [{parentType: 'objectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	language: [{parentType: 'objectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	inverseexpression: [{parentType: 'objectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	objectdatatype: [{parentType: 'objecttermtype', inputName: 'termtypevalue', inputKind: 'value'}],
		  	objectlanguage: [{parentType: 'objecttermtype', inputName: 'termtypevalue', inputKind: 'value'}],
		  	joincondition: [{parentType: 'parenttriplesmap', inputName: 'joincondition', inputKind: 'statement'}],
		  	predicategraphtermap: [{parentType: 'predicateobjectmap', inputName: 'graphmap', inputKind: 'statement'}]
		  };

		  function getStatementTargetConnection(parentBlock, inputName) {
		  	var input = parentBlock.getInput(inputName);
		  	if (!input || !input.connection) {
		  		return null;
		  	}

		  	var lastBlock = input.connection.targetBlock();
		  	while (lastBlock && lastBlock.getNextBlock()) {
		  		lastBlock = lastBlock.getNextBlock();
		  	}

		  	return lastBlock ? lastBlock.nextConnection : input.connection;
		  }

		  function appendToStatementInput(parentBlock, inputName, childBlock) {
		  	var targetConnection = getStatementTargetConnection(parentBlock, inputName);
		  	if (!targetConnection || !childBlock.previousConnection ||
		  		!targetConnection.checkType_(childBlock.previousConnection)) {
		  		return false;
		  	}

		  	if (childBlock.previousConnection.isConnected()) {
		  		childBlock.previousConnection.disconnect();
		  	}
		  	targetConnection.connect(childBlock.previousConnection);
		  	enableBlockTree(childBlock);
		  	parentBlock.render();
		  	return true;
		  }

		  function connectToValueInput(parentBlock, inputName, childBlock) {
		  	var input = parentBlock.getInput(inputName);
		  	if (!input || !input.connection || !childBlock.outputConnection ||
		  		input.connection.targetBlock() ||
		  		!input.connection.checkType_(childBlock.outputConnection)) {
		  		return false;
		  	}

		  	if (childBlock.outputConnection.isConnected()) {
		  		childBlock.outputConnection.disconnect();
		  	}
		  	input.connection.connect(childBlock.outputConnection);
		  	enableBlockTree(childBlock);
		  	parentBlock.render();
		  	return true;
		  }

		  function enableBlockTree(block) {
		  	var descendants = block.getDescendants();
		  	for (var i = 0; i < descendants.length; i++) {
		  		descendants[i].setDisabled(false);
		  	}
		  }

		  function getWorkspaceBlocks() {
		  	if (workspace.getAllBlocks) {
		  		return workspace.getAllBlocks();
		  	}
		  	var blocks = [];
		  	for (var blockID in workspace.blockDB_) {
		  		blocks.push(workspace.blockDB_[blockID]);
		  	}
		  	return blocks;
		  }

		  function getWorkspaceBlockCount() {
		  	return getWorkspaceBlocks().length;
		  }

		  function isBlockInsideTree(rootBlock, candidateBlock) {
		  	var descendants = rootBlock.getDescendants();
		  	for (var i = 0; i < descendants.length; i++) {
		  		if (descendants[i] == candidateBlock) {
		  			return true;
		  		}
		  	}
		  	return false;
		  }

		  function getConnectionCoordinate(connection, fallbackBlock) {
		  	if (connection && typeof connection.x_ == 'number' && typeof connection.y_ == 'number') {
		  		return {x: connection.x_, y: connection.y_};
		  	}
		  	var xy = fallbackBlock.getRelativeToSurfaceXY();
		  	return {x: xy.x, y: xy.y};
		  }

		  function getPlacementTarget(rule, block, candidateParent) {
		  	if (rule.inputKind == 'value') {
		  		var valueInput = candidateParent.getInput(rule.inputName);
		  		if (!valueInput || !valueInput.connection || valueInput.connection.targetBlock() ||
		  			!block.outputConnection ||
		  			!valueInput.connection.checkType_(block.outputConnection)) {
		  			return null;
		  		}
		  		return valueInput.connection;
		  	}

		  	var statementConnection = getStatementTargetConnection(candidateParent, rule.inputName);
		  	if (!statementConnection || !block.previousConnection ||
		  		!statementConnection.checkType_(block.previousConnection)) {
		  		return null;
		  	}
		  	return statementConnection;
		  }

		  function getPlacementScore(block, targetConnection, ruleIndex) {
		  	var sourceConnection = block.outputConnection || block.previousConnection;
		  	var source = getConnectionCoordinate(sourceConnection, block);
		  	var target = getConnectionCoordinate(targetConnection, targetConnection.getSourceBlock());
		  	var dx = source.x - target.x;
		  	var dy = source.y - target.y;
		  	return (ruleIndex * 1000000) + (dx * dx) + (dy * dy);
		  }

		  function findBestPlacement(block) {
		  	var rules = autoConnectRules[block.type];
		  	if (!rules) {
		  		return null;
		  	}

		  	var blocks = getWorkspaceBlocks();
		  	var bestPlacement = null;
		  	for (var ruleIndex = 0; ruleIndex < rules.length; ruleIndex++) {
		  		var rule = rules[ruleIndex];
		  		for (var blockIndex = 0; blockIndex < blocks.length; blockIndex++) {
		  			var candidateParent = blocks[blockIndex];
		  			if (!candidateParent || candidateParent.type != rule.parentType ||
		  				candidateParent.isInFlyout || isBlockInsideTree(block, candidateParent)) {
		  				continue;
		  			}

		  			var targetConnection = getPlacementTarget(rule, block, candidateParent);
		  			if (!targetConnection) {
		  				continue;
		  			}

		  			var score = getPlacementScore(block, targetConnection, ruleIndex);
		  			if (!bestPlacement || score < bestPlacement.score) {
		  				bestPlacement = {
		  					rule: rule,
		  					parentBlock: candidateParent,
		  					score: score
		  				};
		  			}
		  		}
		  	}

		  	return bestPlacement;
		  }

		  function moveStandaloneBlockIntoView(block) {
		  	var xy = block.getRelativeToSurfaceXY();
		  	if (xy.x < 120 || xy.y < 40) {
		  		block.moveBy(180 - xy.x, 120 - xy.y);
		  	}
		  }

		  function placeAddedBlock(block) {
		  	if (!block || block.workspace != workspace || block.isInFlyout || block.getParent()) {
		  		return false;
		  	}

		  	var placement = findBestPlacement(block);
		  	if (placement) {
		  		if (placement.rule.inputKind == 'value') {
		  			return connectToValueInput(placement.parentBlock, placement.rule.inputName, block);
		  		}
		  		return appendToStatementInput(placement.parentBlock, placement.rule.inputName, block);
		  	}

		  	enableBlockTree(block);
		  	moveStandaloneBlockIntoView(block);
		  	return false;
		  }

		  function placeWhenDragEnds(blockId, attempts) {
		  	if (attempts > 40) {
		  		return;
		  	}
		  	if (Blockly.dragMode_ != Blockly.DRAG_NONE) {
		  		setTimeout(function() {
		  			placeWhenDragEnds(blockId, attempts + 1);
		  		}, 50);
		  		return;
		  	}

		  	placeAddedBlock(workspace.getBlockById(blockId));
		  }

		  function placeCreatedBlock(event) {
		  	if (event.type == Blockly.Events.CREATE) {
		  		placeWhenDragEnds(event.blockId, 0);
		  	}
		  }

		  function getFlyoutTopBlockFromEvent(event) {
		  	var flyout = workspace.toolbox_ && workspace.toolbox_.flyout_;
		  	if (!flyout || !flyout.workspace_) {
		  		return null;
		  	}

		  	var topBlocks = flyout.workspace_.getTopBlocks(false);
		  	for (var i = 0; i < topBlocks.length; i++) {
		  		var svgRoot = topBlocks[i].getSvgRoot();
		  		if (svgRoot && svgRoot.contains(event.target)) {
		  			return topBlocks[i];
		  		}
		  	}

		  	for (var j = 0; j < topBlocks.length; j++) {
		  		var blockRoot = topBlocks[j].getSvgRoot();
		  		if (!blockRoot || !blockRoot.getBoundingClientRect) {
		  			continue;
		  		}

		  		var rect = blockRoot.getBoundingClientRect();
		  		if (event.clientX >= rect.left && event.clientX <= rect.right &&
		  			event.clientY >= rect.top && event.clientY <= rect.bottom) {
		  			return topBlocks[j];
		  		}
		  	}

		  	return null;
		  }

		  function getWorkspaceCoordinateFromClient(clientX, clientY) {
		  	var parentSvg = workspace.getParentSvg && workspace.getParentSvg();
		  	var canvas = workspace.getCanvas && workspace.getCanvas();
		  	if (parentSvg && canvas && parentSvg.createSVGPoint && canvas.getScreenCTM) {
		  		var point = parentSvg.createSVGPoint();
		  		point.x = clientX;
		  		point.y = clientY;
		  		var screenCtm = canvas.getScreenCTM();
		  		if (screenCtm) {
		  			return point.matrixTransform(screenCtm.inverse());
		  		}
		  	}

		  	if (!parentSvg || !Blockly.mouseToSvg) {
		  		return null;
		  	}
		  	var inverseScreenCTM = workspace.getInverseScreenCTM && workspace.getInverseScreenCTM();
		  	var fallbackPoint = Blockly.mouseToSvg({clientX: clientX, clientY: clientY}, parentSvg, inverseScreenCTM);
		  	fallbackPoint.x = fallbackPoint.x / workspace.scale;
		  	fallbackPoint.y = fallbackPoint.y / workspace.scale;
		  	return fallbackPoint;
		  }

		  function moveBlockNearClientPosition(block, clientX, clientY, offsetX, offsetY) {
		  	if (typeof clientX != 'number' || typeof clientY != 'number' ||
		  		!workspace.getParentSvg) {
		  		return;
		  	}

		  	var point = getWorkspaceCoordinateFromClient(clientX, clientY);
		  	if (!point) {
		  		return;
		  	}

		  	offsetX = offsetX || 0;
		  	offsetY = offsetY || 0;
		  	var xy = block.getRelativeToSurfaceXY();
		  	block.moveBy(point.x - (offsetX / workspace.scale) - xy.x,
		  		point.y - (offsetY / workspace.scale) - xy.y);
		  }

		  function getFlyoutBlockOffset(block, event) {
		  	var blockRoot = block.getSvgRoot();
		  	if (!blockRoot || !blockRoot.getBoundingClientRect) {
		  		return {x: 0, y: 0};
		  	}

		  	var rect = blockRoot.getBoundingClientRect();
		  	return {
		  		x: event.clientX - rect.left,
		  		y: event.clientY - rect.top
		  	};
		  }

		  function createDragPreview(drag) {
		  	var parentSvg = workspace.getParentSvg && workspace.getParentSvg();
		  	var blockRoot = drag.flyoutBlock.getSvgRoot();
		  	if (!parentSvg || !blockRoot || !blockRoot.cloneNode) {
		  		return;
		  	}

		  	var preview = Blockly.createSvgElement('g', {
		  		'class': 'blocklyFallbackDragPreview',
		  		'style': 'opacity: 0.55; pointer-events: none;'
		  	}, parentSvg);
		  	var clone = blockRoot.cloneNode(true);
		  	clone.setAttribute('transform', 'translate(0,0)');
		  	preview.appendChild(clone);
		  	drag.preview = preview;
		  	updateDragPreview(drag, drag.lastX, drag.lastY);
		  }

		  function updateDragPreview(drag, clientX, clientY) {
		  	if (!drag.preview) {
		  		return;
		  	}

		  	var parentSvg = workspace.getParentSvg && workspace.getParentSvg();
		  	if (!parentSvg || !parentSvg.getBoundingClientRect) {
		  		return;
		  	}

		  	var rect = parentSvg.getBoundingClientRect();
		  	var x = clientX - rect.left - drag.offsetX;
		  	var y = clientY - rect.top - drag.offsetY;
		  	drag.preview.setAttribute('transform', 'translate(' + x + ',' + y + ')');
		  }

		  function removeDragPreview(drag) {
		  	if (drag && drag.preview && drag.preview.parentNode) {
		  		drag.preview.parentNode.removeChild(drag.preview);
		  	}
		  	if (drag) {
		  		drag.preview = null;
		  	}
		  }

		  function hasDragMoved(drag, event) {
		  	var dx = event.clientX - drag.startX;
		  	var dy = event.clientY - drag.startY;
		  	var threshold = Blockly.DRAG_RADIUS || 5;
		  	return (dx * dx) + (dy * dy) >= threshold * threshold;
		  }

		  function cloneFlyoutBlock(flyoutBlock, clientX, clientY, offsetX, offsetY) {
		  	var xml = Blockly.Xml.blockToDom(flyoutBlock);
		  	Blockly.Xml.deleteNext(xml);
		  	var block = Blockly.Xml.domToBlock(xml, workspace);
		  	moveBlockNearClientPosition(block, clientX, clientY, offsetX, offsetY);
		  	placeAddedBlock(block);
		  	generateCode();
		  	return block;
		  }

		  function installFlyoutBlockFallback() {
		  	var flyout = workspace.toolbox_ && workspace.toolbox_.flyout_;
		  	if (!flyout || !flyout.svgGroup_) {
		  		return;
		  	}

		  	var fallbackDrag = null;
		  	flyout.svgGroup_.addEventListener('mousedown', function(event) {
		  		var block = getFlyoutTopBlockFromEvent(event);
		  		if (!block) {
		  			return;
		  		}

		  		var offset = getFlyoutBlockOffset(block, event);
		  		fallbackDrag = {
		  			flyoutBlock: block,
		  			blockCountBefore: getWorkspaceBlockCount(),
		  			startX: event.clientX,
		  			startY: event.clientY,
		  			lastX: event.clientX,
		  			lastY: event.clientY,
		  			offsetX: offset.x,
		  			offsetY: offset.y,
		  			hasMoved: false,
		  			preview: null
		  		};
		  	}, true);

		  	document.addEventListener('mousemove', function(event) {
		  		if (!fallbackDrag) {
		  			return;
		  		}

		  		if (getWorkspaceBlockCount() != fallbackDrag.blockCountBefore) {
		  			removeDragPreview(fallbackDrag);
		  			fallbackDrag = null;
		  			return;
		  		}

		  		fallbackDrag.lastX = event.clientX;
		  		fallbackDrag.lastY = event.clientY;
		  		fallbackDrag.hasMoved = fallbackDrag.hasMoved || hasDragMoved(fallbackDrag, event);
		  		if (!fallbackDrag.hasMoved) {
		  			return;
		  		}

		  		if (!fallbackDrag.preview) {
		  			createDragPreview(fallbackDrag);
		  		}
		  		updateDragPreview(fallbackDrag, event.clientX, event.clientY);
		  		event.preventDefault();
		  	}, true);

		  	document.addEventListener('mouseup', function(event) {
		  		if (!fallbackDrag) {
		  			return;
		  		}

		  		var drag = fallbackDrag;
		  		drag.lastX = event.clientX;
		  		drag.lastY = event.clientY;
		  		drag.hasMoved = drag.hasMoved || hasDragMoved(drag, event);
		  		fallbackDrag = null;
		  		setTimeout(function() {
		  			removeDragPreview(drag);
		  			if (drag.hasMoved && getWorkspaceBlockCount() == drag.blockCountBefore) {
		  				cloneFlyoutBlock(drag.flyoutBlock, drag.lastX, drag.lastY, drag.offsetX, drag.offsetY);
		  			}
		  		}, 100);
		  	}, true);
		  }

		  function generateCode(event) {
		  	var code = R2RML.workspaceToCode(workspace);
		  	document.getElementById('code').value = code;
		  }
		  
		  installFlyoutBlockFallback();
		  workspace.addChangeListener(placeCreatedBlock);
		  workspace.addChangeListener(generateCode);

		  $('.nav-tabs a').on('click', function(event){
				var x = $(event.target).text();         // active tab
				if(x != 'Mapping') {
