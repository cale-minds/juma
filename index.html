		<script>
		var workspace = Blockly.inject('blocklyDiv', 
		  {toolbox: document.getElementById('toolbox'), 
		  	zoom:
	         {controls: true,
	          wheel: true,
	          startScale: 0.8,
	          maxScale: 3,
	          minScale: 0.3,
	          scaleSpeed: 1.1},
	     		trashcan: true,
	     		sounds: false});

		  Blockly.Xml.domToWorkspace(document.getElementById('startBlocks'), Blockly.mainWorkspace);

		  function appendToStatementInput(parentBlock, inputName, childBlock) {
		  	var input = parentBlock.getInput(inputName);
		  	if (!input) {
		  		return;
		  	}

		  	var inputConnection = input.connection;
		  	var lastBlock = inputConnection.targetBlock();
		  	while (lastBlock && lastBlock.getNextBlock()) {
		  		lastBlock = lastBlock.getNextBlock();
		  	}

		  	var targetConnection = lastBlock ? lastBlock.nextConnection : inputConnection;
		  	if (targetConnection && childBlock.previousConnection &&
		  		targetConnection.checkType_(childBlock.previousConnection)) {
		  		if (childBlock.previousConnection.isConnected()) {
		  			childBlock.previousConnection.disconnect();
		  		}
		  		targetConnection.connect(childBlock.previousConnection);
		  		enableBlockTree(childBlock);
		  		parentBlock.render();
		  	}
		  }

		  function enableBlockTree(block) {
		  	var descendants = block.getDescendants();
		  	for (var i = 0; i < descendants.length; i++) {
		  		descendants[i].setDisabled(false);
		  	}
		  }

		  function attachTripleMapToMapping(block) {
		  	if (!block || block.type != 'triplemap' || block.getParent()) {
		  		return;
		  	}

		  	var mappings = getBlocksByType('mapping');
		  	if (mappings.length) {
		  		appendToStatementInput(mappings[0], 'triplesmap', block);
		  	}
		  }

		  function attachPredicateObjectMapToTripleMap(block) {
		  	if (!block || block.type != 'predicateobjectmap' || block.getParent()) {
		  		return;
		  	}

		  	var tripleMap = Blockly.selected && getTripleMap(Blockly.selected);
		  	if (!tripleMap) {
		  		var tripleMaps = getBlocksByType('triplemap');
		  		tripleMap = tripleMaps.length && tripleMaps[0];
		  	}

		  	if (tripleMap) {
		  		appendToStatementInput(tripleMap, 'predicateobjectmap', block);
		  	}
		  }

		  function placeTemplateBlock(block) {
		  	attachTripleMapToMapping(block);
		  	attachPredicateObjectMapToTripleMap(block);
		  	if (!block.getParent()) {
		  		enableBlockTree(block);
		  		block.moveBy(180, 120);
		  	}
		  }

		  function attachWhenDragEnds(blockId, attempts) {
		  	if (attempts > 40) {
		  		return;
		  	}
		  	if (Blockly.dragMode_ != Blockly.DRAG_NONE) {
		  		setTimeout(function() {
		  			attachWhenDragEnds(blockId, attempts + 1);
		  		}, 50);
		  		return;
		  	}

		  	attachTripleMapToMapping(workspace.getBlockById(blockId));
		  }

		  function attachDroppedTripleMap(event) {
		  	if (event.type == Blockly.Events.CREATE || event.type == Blockly.Events.MOVE) {
		  		attachWhenDragEnds(event.blockId, 0);
		  	}
		  }

		  function getFlyoutTopBlockFromEvent(event) {
		  	var flyout = workspace.toolbox_ && workspace.toolbox_.flyout_;
		  	if (!flyout || !flyout.workspace_) {
		  		return null;
		  	}

		  	var topBlocks = flyout.workspace_.getTopBlocks(false);
		  	for (var i = 0; i < topBlocks.length; i++) {
		  		var svgRoot = topBlocks[i].getSvgRoot();
		  		if (svgRoot && svgRoot.contains(event.target)) {
		  			return topBlocks[i];
		  		}
		  	}

		  	for (var j = 0; j < topBlocks.length; j++) {
		  		var blockRoot = topBlocks[j].getSvgRoot();
		  		if (!blockRoot || !blockRoot.getBoundingClientRect) {
		  			continue;
		  		}

		  		var rect = blockRoot.getBoundingClientRect();
		  		if (event.clientX >= rect.left && event.clientX <= rect.right &&
		  			event.clientY >= rect.top && event.clientY <= rect.bottom) {
		  			return topBlocks[j];
		  		}
		  	}

		  	return null;
		  }

		  function cloneTemplateBlock(templateBlock) {
		  	var xml = Blockly.Xml.blockToDom(templateBlock);
		  	Blockly.Xml.deleteNext(xml);
		  	var block = Blockly.Xml.domToBlock(xml, workspace);
		  	block.initSvg();
		  	block.render();
		  	placeTemplateBlock(block);
		  	return block;
		  }

		  function installTemplateFallback() {
		  	var flyout = workspace.toolbox_ && workspace.toolbox_.flyout_;
		  	if (!flyout || !flyout.svgGroup_) {
		  		return;
		  	}

		  	var pendingTemplate = null;
		  	var blockCountBefore = 0;
		  	flyout.svgGroup_.addEventListener('mousedown', function(event) {
		  		var block = getFlyoutTopBlockFromEvent(event);
		  		if (!block || (block.type != 'triplemap' && block.type != 'predicateobjectmap')) {
		  			return;
		  		}

		  		pendingTemplate = block;
		  		blockCountBefore = getBlocksByType(block.type).length;
		  	}, true);

		  	document.addEventListener('mouseup', function() {
		  		if (!pendingTemplate) {
		  			return;
		  		}

		  		var templateBlock = pendingTemplate;
		  		var previousCount = blockCountBefore;
		  		pendingTemplate = null;
		  		setTimeout(function() {
		  			if (getBlocksByType(templateBlock.type).length == previousCount) {
		  				cloneTemplateBlock(templateBlock);
		  			}
		  		}, 100);
		  	}, true);
		  }

		  function generateCode(event) {
		  	var code = R2RML.workspaceToCode(workspace);
		  	document.getElementById('code').value = code;
		  }
		  
		  installTemplateFallback();
		  workspace.addChangeListener(attachDroppedTripleMap);
		  workspace.addChangeListener(generateCode);

		  $('.nav-tabs a').on('click', function(event){
				var x = $(event.target).text();         // active tab
				if(x != 'Mapping') {
					$('.blocklyToolboxDiv').hide();
				} else {
					$('.blocklyToolboxDiv').show();
				}
			});
		</script>
