<!DOCTYPE html>
<html>
	<head>
        <meta http-equiv="content-type" content="text/html; charset=utf-8" />
        <script src="jquery-2.1.4.min.js"></script>
		<script src="bootstrap.min.js"></script>

	    <!-- Blockly core imports -->
		<script src="blockly_compressed.js"></script>
		<script src="blocks_compressed.js"></script>
		<script src="en.js"></script>

		<link rel="stylesheet" type="text/css" href="bootstrap-theme.min.css">
		<link rel="stylesheet" type="text/css" href="bootstrap.min.css">

		<style type="text/css">
			html,
			body {
				height: 100%;
			}

			body {
				background: #f5f7fb;
				color: #263238;
				display: flex;
				flex-direction: column;
				font-family: "Segoe UI", Roboto, Arial, sans-serif;
				overflow: hidden;
			}

			.hideInput {
				display: none;
			}

			.wow {font-style: italic;}

			body .blocklyIconShape {
				fill: #f00 ;
			}

			.app-header {
				align-items: stretch;
				background: #ffffff;
				border-bottom: 1px solid #dfe5ee;
				box-shadow: 0 1px 4px rgba(31, 41, 55, 0.08);
				display: flex;
				flex: 0 0 auto;
				padding: 0 20px;
			}

			.app-brand {
				align-items: center;
				color: #102a43;
				display: inline-flex;
				flex: 0 0 auto;
				font-size: 21px;
				font-weight: 700;
				gap: 10px;
				letter-spacing: 0;
				padding: 0 28px 0 0;
			}

			.nav-tabs {
				align-items: stretch;
				background: transparent;
				border-bottom: 0;
				box-shadow: none;
				display: flex;
				flex: 1 1 auto;
				margin-bottom: 0;
				padding: 0;
			}

			.nav-tabs > li > a {
				align-items: center;
				border-radius: 0;
				color: #455a64;
				display: inline-flex;
				font-weight: 500;
				gap: 8px;
				margin-right: 8px;
				padding: 14px 16px;
			}

			.juma-paw-logo {
				display: inline-flex;
				height: 34px;
				width: 34px;
			}

			.juma-paw-logo svg {
				display: block;
				height: 100%;
				width: 100%;
			}

			.nav-tabs > li.active > a,
			.nav-tabs > li.active > a:focus,
			.nav-tabs > li.active > a:hover {
				border: 0;
				border-bottom: 3px solid #1976d2;
				color: #1976d2;
			}

			.tab-content,
			.tab-pane {
				min-height: 0;
			}

			.tab-content {
				flex: 1 1 auto;
				overflow: hidden;
			}

			.tab-content > .tab-pane.active {
				display: flex;
				flex-direction: column;
				height: 100%;
			}

			.r2rml-mapping-pane {
				box-sizing: border-box;
				display: flex;
				flex-direction: column;
				height: 100%;
				padding: 16px 20px 20px;
			}

			.mapping-layout {
				display: flex;
				flex: 1 1 auto;
				gap: 16px;
				height: 100%;
				min-height: 0;
				min-width: 0;
			}

			.workspace-column {
				display: flex;
				flex: 1 1 auto;
				flex-direction: column;
				min-height: 0;
				min-width: 0;
			}

			.workspace-editor {
				flex: 0 0 340px;
				min-width: 300px;
			}

			.workspace-editor .panel {
				border: 0;
				border-radius: 10px;
				box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
			}

			.workspace-panel {
				border: 0;
				border-radius: 12px;
				box-shadow: 0 8px 24px rgba(15, 23, 42, 0.10);
				flex: 1 1 auto;
				margin-bottom: 0;
				min-height: 0;
				overflow: hidden;
			}

			.r2rml-export-pane {
				box-sizing: border-box;
				display: flex;
				flex-direction: column;
				height: 100%;
				padding: 16px 20px 20px;
			}

			.r2rml-export-pane > .row {
				margin-left: 0;
				margin-right: 0;
			}

			.r2rml-export-pane > .row > .col-md-12 {
				padding-left: 0;
				padding-right: 0;
			}

			.r2rml-export-toolbar {
				margin-bottom: 12px;
			}

			.r2rml-export-pane .panel {
				border: 0;
				border-radius: 12px;
				box-shadow: 0 8px 24px rgba(15, 23, 42, 0.10);
				margin-bottom: 0;
				overflow: hidden;
			}

			#code {
				border: 0;
				box-shadow: none;
				height: calc(100vh - 170px);
				min-height: 420px;
				resize: none;
			}

			.r2rml-export-toolbar .form-group {
				margin-right: 6px;
			}

			.mapping-toolbar {
				background: #ffffff;
				border-radius: 12px;
				box-shadow: 0 4px 16px rgba(15, 23, 42, 0.08);
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				gap: 10px;
				margin-bottom: 12px;
				padding: 10px;
			}

			.toolbar-group {
				align-items: center;
				display: inline-flex;
				flex-wrap: wrap;
				gap: 8px;
			}

			.toolbar-separator {
				align-self: stretch;
				background: #dfe7f1;
				margin: 4px 6px;
				width: 1px;
			}

			.toolbar-spacer {
				flex: 1 1 auto;
			}

			.mapping-toolbar .btn,
			.r2rml-export-toolbar .btn,
			#saveLogicalTable {
				background: #ffffff;
				border: 1px solid #d7dee8;
				border-radius: 8px;
				box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
				color: #263238;
				font-weight: 500;
				height: 40px;
				transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
			}

			.mapping-toolbar .btn:hover,
			.r2rml-export-toolbar .btn:hover,
			#saveLogicalTable:hover {
				background: #f8fbff;
				box-shadow: 0 3px 8px rgba(15, 23, 42, 0.14);
				transform: translateY(-1px);
			}

			.mapping-toolbar .viewport-action {
				background: #eef5ff;
				border-color: #c7dcf8;
				color: #1565c0;
			}

			.mapping-toolbar .checkbox {
				margin-left: 0;
				margin-right: 0;
				padding-top: 0;
			}

			.autosave-status {
				align-items: center;
				display: inline-flex;
				flex: 0 0 auto;
				gap: 12px;
				margin-left: 0;
			}

			.mapping-toolbar .checkbox-inline {
				align-items: center;
				color: #455a64;
				display: inline-flex;
				font-weight: 500;
				height: 40px;
				margin-bottom: 0;
			}

			.storage-status {
				background: #eef2f7;
				border-radius: 999px;
				color: #607d8b;
				display: inline-block;
				font-size: 13px;
				line-height: 24px;
				padding: 0 10px;
			}

			.mapping-workspace {
				height: 100%;
				min-height: 0;
			}

			.blocklySvg {
				background: #ffffff;
			}

			.blocklyMainBackground {
				cursor: grab;
				stroke: #d7e2ec;
			}

			.blocklyMainBackground:active {
				cursor: grabbing;
			}

			.blocklyToolboxDiv {
				background: #f1f5f9;
				border-right: 1px solid #d7dee8;
			}

			.blocklyTreeRow {
				border-radius: 0 18px 18px 0;
				margin: 3px 8px 3px 0;
				padding: 3px 8px 3px 0;
			}

			.blocklyTreeSelected {
				background-color: #1976d2 !important;
				color: #ffffff;
			}

			.app-footer {
				align-items: center;
				background: #ffffff;
				border-top: 1px solid #dfe5ee;
				box-shadow: 0 -1px 4px rgba(31, 41, 55, 0.06);
				color: #607d8b;
				display: flex;
				flex: 0 0 auto;
				flex-wrap: wrap;
				font-size: 13px;
				gap: 8px;
				justify-content: center;
				line-height: 1.4;
				padding: 8px 16px;
				text-align: center;
			}

			.app-footer strong {
				color: #263238;
				font-weight: 600;
			}

			.app-footer .footer-divider {
				color: #b0bec5;
			}

			@media (max-width: 900px) {
				body {
					overflow: auto;
				}

				.app-header {
					align-items: flex-start;
					flex-direction: column;
					padding: 0 12px;
				}

				.app-brand {
					padding: 10px 4px 0;
				}

				.nav-tabs {
					width: 100%;
				}

				.tab-content,
				.tab-pane {
					height: auto;
					min-height: calc(100vh - 96px);
				}

				.r2rml-mapping-pane {
					min-height: calc(100vh - 96px);
					padding: 12px;
				}

				.mapping-layout {
					flex-direction: column;
				}

				.workspace-column {
					min-height: 70vh;
				}

				.workspace-editor {
					flex-basis: auto;
					min-width: 0;
				}

				.toolbar-separator,
				.toolbar-spacer {
					display: none;
				}

				.autosave-status {
					margin-left: 0;
				}

				.app-footer {
					align-items: center;
					flex-direction: column;
					gap: 2px;
				}

				.app-footer .footer-divider {
					display: none;
				}
			}
		</style>
	</head>

		<script>
		var workspace = Blockly.inject('blocklyDiv',
		  {toolbox: document.getElementById('toolbox'),
		    grid:
	          {spacing: 25,
	           length: 2,
	           colour: '#e4ecf5',
	           snap: false},
		    scrollbars: true,
		    zoom:
	          {controls: true,
	           wheel: true,
	           startScale: 0.85,
	           maxScale: 4,
	           minScale: 0.1,
	           scaleSpeed: 1.08},
	     		trashcan: true,
	     		sounds: false});

      var STORAGE_KEYS = {
        draftXml: 'juma.r2rml.workspace.draftXml',
        savedXml: 'juma.r2rml.workspace.savedXml',
        code: 'juma.r2rml.generatedCode',
        autosave: 'juma.r2rml.autosaveEnabled'
		  };
		  var autosaveEnabled = true;
		  var isRestoringWorkspace = false;

		  var autoConnectRules = {
		  	predefinedprefix: [{parentType: 'mapping', inputName: 'mapping', inputKind: 'statement'}],
		  	prefix: [{parentType: 'mapping', inputName: 'mapping', inputKind: 'statement'}],
		  	base: [{parentType: 'mapping', inputName: 'mapping', inputKind: 'statement'}],
		  	triplemap: [{parentType: 'mapping', inputName: 'triplesmap', inputKind: 'statement'}],
		  	tablesqlquery: [{parentType: 'triplemap', inputName: 'logicaltable', inputKind: 'statement'}],
		  	subjectmap: [{parentType: 'triplemap', inputName: 'subjectmap', inputKind: 'statement'}],
		  	class: [{parentType: 'subjectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	subjecttermtype: [{parentType: 'subjectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	subjectgraphtermap: [{parentType: 'subjectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	predicateobjectmap: [{parentType: 'triplemap', inputName: 'predicateobjectmap', inputKind: 'statement'}],
		  	predicatemap: [{parentType: 'predicateobjectmap', inputName: 'ppredicateobjectmap', inputKind: 'statement'}],
		  	predicatetermtype: [{parentType: 'predicatemap', inputName: 'termmap', inputKind: 'statement'}],
		  	objectmap: [{parentType: 'predicateobjectmap', inputName: 'opredicateobjectmap', inputKind: 'statement'}],
		  	parenttriplesmap: [{parentType: 'predicateobjectmap', inputName: 'opredicateobjectmap', inputKind: 'statement'}],
		  	objecttermtype: [{parentType: 'objectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	datatype: [{parentType: 'objectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	language: [{parentType: 'objectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	inverseexpression: [{parentType: 'objectmap', inputName: 'termmap', inputKind: 'statement'}],
		  	objectdatatype: [{parentType: 'objecttermtype', inputName: 'termtypevalue', inputKind: 'value'}],
		  	objectlanguage: [{parentType: 'objecttermtype', inputName: 'termtypevalue', inputKind: 'value'}],
		  	joincondition: [{parentType: 'parenttriplesmap', inputName: 'joincondition', inputKind: 'statement'}],
		  	predicategraphtermap: [{parentType: 'predicateobjectmap', inputName: 'graphmap', inputKind: 'statement'}]
		  };

		  function getStatementTargetConnection(parentBlock, inputName) {
		  	var input = parentBlock.getInput(inputName);
		  	if (!input || !input.connection) {
		  		return null;
		  	}

		  	var lastBlock = input.connection.targetBlock();
		  	while (lastBlock && lastBlock.getNextBlock()) {
		  		lastBlock = lastBlock.getNextBlock();
		  	}

		  	return lastBlock ? lastBlock.nextConnection : input.connection;
		  }

		  function appendToStatementInput(parentBlock, inputName, childBlock) {
		  	var targetConnection = getStatementTargetConnection(parentBlock, inputName);
		  	if (!targetConnection || !childBlock.previousConnection ||
		  		!targetConnection.checkType_(childBlock.previousConnection)) {
		  		return false;
		  	}

		  	if (childBlock.previousConnection.isConnected()) {
		  		childBlock.previousConnection.disconnect();
		  	}
		  	targetConnection.connect(childBlock.previousConnection);
		  	enableBlockTree(childBlock);
		  	parentBlock.render();
		  	return true;
		  }

		  function connectToValueInput(parentBlock, inputName, childBlock) {
		  	var input = parentBlock.getInput(inputName);
		  	if (!input || !input.connection || !childBlock.outputConnection ||
		  		input.connection.targetBlock() ||
		  		!input.connection.checkType_(childBlock.outputConnection)) {
		  		return false;
		  	}

		  	if (childBlock.outputConnection.isConnected()) {
		  		childBlock.outputConnection.disconnect();
		  	}
		  	input.connection.connect(childBlock.outputConnection);
		  	enableBlockTree(childBlock);
		  	parentBlock.render();
		  	return true;
		  }

		  function enableBlockTree(block) {
		  	var descendants = block.getDescendants();
		  	for (var i = 0; i < descendants.length; i++) {
		  		descendants[i].setDisabled(false);
		  	}
		  }

		  function getWorkspaceBlocks() {
		  	if (workspace.getAllBlocks) {
		  		return workspace.getAllBlocks();
		  	}
		  	var blocks = [];
		  	for (var blockID in workspace.blockDB_) {
		  		blocks.push(workspace.blockDB_[blockID]);
		  	}
		  	return blocks;
		  }

		  function getWorkspaceBlockCount() {
		  	return getWorkspaceBlocks().length;
		  }

		  function isBlockInsideTree(rootBlock, candidateBlock) {
		  	var descendants = rootBlock.getDescendants();
		  	for (var i = 0; i < descendants.length; i++) {
		  		if (descendants[i] == candidateBlock) {
		  			return true;
		  		}
		  	}
		  	return false;
		  }

		  function getConnectionCoordinate(connection, fallbackBlock) {
		  	if (connection && typeof connection.x_ == 'number' && typeof connection.y_ == 'number') {
		  		return {x: connection.x_, y: connection.y_};
		  	}
		  	var xy = fallbackBlock.getRelativeToSurfaceXY();
		  	return {x: xy.x, y: xy.y};
		  }

		  function getPlacementTarget(rule, block, candidateParent) {
		  	if (rule.inputKind == 'value') {
		  		var valueInput = candidateParent.getInput(rule.inputName);
		  		if (!valueInput || !valueInput.connection || valueInput.connection.targetBlock() ||
		  			!block.outputConnection ||
		  			!valueInput.connection.checkType_(block.outputConnection)) {
		  			return null;
		  		}
		  		return valueInput.connection;
		  	}

		  	var statementConnection = getStatementTargetConnection(candidateParent, rule.inputName);
		  	if (!statementConnection || !block.previousConnection ||
		  		!statementConnection.checkType_(block.previousConnection)) {
		  		return null;
		  	}
		  	return statementConnection;
		  }

		  function getPlacementScore(block, targetConnection, ruleIndex) {
		  	var sourceConnection = block.outputConnection || block.previousConnection;
		  	var source = getConnectionCoordinate(sourceConnection, block);
		  	var target = getConnectionCoordinate(targetConnection, targetConnection.getSourceBlock());
		  	var dx = source.x - target.x;
		  	var dy = source.y - target.y;
		  	return (ruleIndex * 1000000) + (dx * dx) + (dy * dy);
		  }

		  function findBestPlacement(block) {
		  	var rules = autoConnectRules[block.type];
		  	if (!rules) {
		  		return null;
		  	}

		  	var blocks = getWorkspaceBlocks();
		  	var bestPlacement = null;
		  	for (var ruleIndex = 0; ruleIndex < rules.length; ruleIndex++) {
		  		var rule = rules[ruleIndex];
		  		for (var blockIndex = 0; blockIndex < blocks.length; blockIndex++) {
		  			var candidateParent = blocks[blockIndex];
		  			if (!candidateParent || candidateParent.type != rule.parentType ||
		  				candidateParent.isInFlyout || isBlockInsideTree(block, candidateParent)) {
		  				continue;
		  			}

		  			var targetConnection = getPlacementTarget(rule, block, candidateParent);
		  			if (!targetConnection) {
		  				continue;
		  			}

		  			var score = getPlacementScore(block, targetConnection, ruleIndex);
		  			if (!bestPlacement || score < bestPlacement.score) {
		  				bestPlacement = {
		  					rule: rule,
		  					parentBlock: candidateParent,
		  					score: score
		  				};
		  			}
		  		}
		  	}

		  	return bestPlacement;
		  }

		  function moveStandaloneBlockIntoView(block) {
		  	var xy = block.getRelativeToSurfaceXY();
		  	if (xy.x < 120 || xy.y < 40) {
		  		block.moveBy(180 - xy.x, 120 - xy.y);
		  	}
		  }

		  function placeAddedBlock(block) {
		  	if (!block || block.workspace != workspace || block.isInFlyout || block.getParent()) {
		  		return false;
		  	}

		  	var placement = findBestPlacement(block);
		  	if (placement) {
		  		if (placement.rule.inputKind == 'value') {
		  			return connectToValueInput(placement.parentBlock, placement.rule.inputName, block);
		  		}
		  		return appendToStatementInput(placement.parentBlock, placement.rule.inputName, block);
		  	}

		  	enableBlockTree(block);
		  	moveStandaloneBlockIntoView(block);
		  	return false;
		  }

		  function placeWhenDragEnds(blockId, attempts) {
		  	if (attempts > 40) {
		  		return;
		  	}
		  	if (Blockly.dragMode_ != Blockly.DRAG_NONE) {
		  		setTimeout(function() {
		  			placeWhenDragEnds(blockId, attempts + 1);
		  		}, 50);
		  		return;
		  	}

		  	placeAddedBlock(workspace.getBlockById(blockId));
		  }

		  function placeCreatedBlock(event) {
		  	if (event.type == Blockly.Events.CREATE) {
		  		placeWhenDragEnds(event.blockId, 0);
		  	}
		  }

		  function getFlyoutTopBlockFromEvent(event) {
		  	var flyout = workspace.toolbox_ && workspace.toolbox_.flyout_;
		  	if (!flyout || !flyout.workspace_) {
		  		return null;
		  	}

		  	var topBlocks = flyout.workspace_.getTopBlocks(false);
		  	for (var i = 0; i < topBlocks.length; i++) {
		  		var svgRoot = topBlocks[i].getSvgRoot();
		  		if (svgRoot && svgRoot.contains(event.target)) {
		  			return topBlocks[i];
		  		}
		  	}

		  	for (var j = 0; j < topBlocks.length; j++) {
		  		var blockRoot = topBlocks[j].getSvgRoot();
		  		if (!blockRoot || !blockRoot.getBoundingClientRect) {
		  			continue;
		  		}

		  		var rect = blockRoot.getBoundingClientRect();
		  		if (event.clientX >= rect.left && event.clientX <= rect.right &&
		  			event.clientY >= rect.top && event.clientY <= rect.bottom) {
		  			return topBlocks[j];
		  		}
		  	}

		  	return null;
		  }

		  function getWorkspaceCoordinateFromClient(clientX, clientY) {
		  	var parentSvg = workspace.getParentSvg && workspace.getParentSvg();
		  	var canvas = workspace.getCanvas && workspace.getCanvas();
		  	if (parentSvg && canvas && parentSvg.createSVGPoint && canvas.getScreenCTM) {
		  		var point = parentSvg.createSVGPoint();
		  		point.x = clientX;
		  		point.y = clientY;
		  		var screenCtm = canvas.getScreenCTM();
		  		if (screenCtm) {
		  			return point.matrixTransform(screenCtm.inverse());
		  		}
		  	}

		  	if (!parentSvg || !Blockly.mouseToSvg) {
		  		return null;
		  	}
		  	var inverseScreenCTM = workspace.getInverseScreenCTM && workspace.getInverseScreenCTM();
		  	var fallbackPoint = Blockly.mouseToSvg({clientX: clientX, clientY: clientY}, parentSvg, inverseScreenCTM);
		  	fallbackPoint.x = fallbackPoint.x / workspace.scale;
		  	fallbackPoint.y = fallbackPoint.y / workspace.scale;
		  	return fallbackPoint;
		  }

		  function moveBlockNearClientPosition(block, clientX, clientY, offsetX, offsetY) {
		  	if (typeof clientX != 'number' || typeof clientY != 'number' ||
		  		!workspace.getParentSvg) {
		  		return;
		  	}

		  	var point = getWorkspaceCoordinateFromClient(clientX, clientY);
		  	if (!point) {
		  		return;
		  	}

		  	offsetX = offsetX || 0;
		  	offsetY = offsetY || 0;
		  	var xy = block.getRelativeToSurfaceXY();
		  	block.moveBy(point.x - (offsetX / workspace.scale) - xy.x,
		  		point.y - (offsetY / workspace.scale) - xy.y);
		  }

		  function getFlyoutBlockOffset(block, event) {
		  	var blockRoot = block.getSvgRoot();
		  	if (!blockRoot || !blockRoot.getBoundingClientRect) {
		  		return {x: 0, y: 0};
		  	}

		  	var rect = blockRoot.getBoundingClientRect();
		  	return {
		  		x: event.clientX - rect.left,
		  		y: event.clientY - rect.top
		  	};
		  }

		  function createDragPreview(drag) {
		  	var parentSvg = workspace.getParentSvg && workspace.getParentSvg();
		  	var blockRoot = drag.flyoutBlock.getSvgRoot();
		  	if (!parentSvg || !blockRoot || !blockRoot.cloneNode) {
		  		return;
		  	}

		  	var preview = Blockly.createSvgElement('g', {
		  		'class': 'blocklyFallbackDragPreview',
		  		'style': 'opacity: 0.55; pointer-events: none;'

		  	clone.setAttribute('transform', 'translate(0,0)');

		  	updateDragPreview(drag, drag.lastX, drag.lastY);
		  }

		  function updateDragPreview(drag, clientX, clientY) {
		  	if (!drag.preview) {
		  		return;
		  	}

		  	var parentSvg = workspace.getParentSvg && workspace.getParentSvg();
		  	if (!parentSvg || !parentSvg.getBoundingClientRect) {
		  		return;
		  	}

		  	var rect = parentSvg.getBoundingClientRect();
		  	var x = clientX - rect.left - drag.offsetX;
		  	var y = clientY - rect.top - drag.offsetY;
		  	drag.preview.setAttribute('transform', 'translate(' + x + ',' + y + ')');
		  }

		  function removeDragPreview(drag) {
		  	if (drag && drag.preview && drag.preview.parentNode) {
		  		drag.preview.parentNode.removeChild(drag.preview);
		  	}
		  	if (drag) {
		  		drag.preview = null;
		  	}
		  }

		  function hasDragMoved(drag, event) {
		  	var dx = event.clientX - drag.startX;
		  	var dy = event.clientY - drag.startY;
		  	var threshold = Blockly.DRAG_RADIUS || 5;
		  	return (dx * dx) + (dy * dy) >= threshold * threshold;
		  }

		  function cloneFlyoutBlock(flyoutBlock, clientX, clientY, offsetX, offsetY) {
		  	var xml = Blockly.Xml.blockToDom(flyoutBlock);
		  	Blockly.Xml.deleteNext(xml);
		  	var block = Blockly.Xml.domToBlock(xml, workspace);
		  	moveBlockNearClientPosition(block, clientX, clientY, offsetX, offsetY);
		  	placeAddedBlock(block);
		  	generateCode();
		  	return block;
		  }

		  function installFlyoutBlockFallback() {
		  	var flyout = workspace.toolbox_ && workspace.toolbox_.flyout_;
		  	if (!flyout || !flyout.svgGroup_) {
		  		return;
		  	}

		  	var fallbackDrag = null;
		  	flyout.svgGroup_.addEventListener('mousedown', function(event) {
		  		var block = getFlyoutTopBlockFromEvent(event);
		  		if (!block) {
		  			return;
		  		}

		  		var offset = getFlyoutBlockOffset(block, event);
		  		fallbackDrag = {
		  			flyoutBlock: block,
		  			blockCountBefore: getWorkspaceBlockCount(),
		  			startX: event.clientX,
		  			startY: event.clientY,
		  			lastX: event.clientX,
		  			lastY: event.clientY,
		  			offsetX: offset.x,
		  			offsetY: offset.y,
		  			hasMoved: false,
		  			preview: null
		  		};
		  	}, true);

		  	document.addEventListener('mousemove', function(event) {
		  		if (!fallbackDrag) {
		  			return;
		  		}

		  		if (getWorkspaceBlockCount() != fallbackDrag.blockCountBefore) {
		  			removeDragPreview(fallbackDrag);
		  			fallbackDrag = null;
		  			return;
		  		}

		  		fallbackDrag.lastX = event.clientX;
		  		fallbackDrag.lastY = event.clientY;
		  		fallbackDrag.hasMoved = fallbackDrag.hasMoved || hasDragMoved(fallbackDrag, event);
		  		if (!fallbackDrag.hasMoved) {
		  			return;
		  		}

		  		if (!fallbackDrag.preview) {
		  			createDragPreview(fallbackDrag);
		  		}
		  		updateDragPreview(fallbackDrag, event.clientX, event.clientY);
		  		event.preventDefault();
		  	}, true);

		  	document.addEventListener('mouseup', function(event) {
		  		if (!fallbackDrag) {
		  			return;
		  		}

		  		var drag = fallbackDrag;
		  		drag.lastX = event.clientX;
		  		drag.lastY = event.clientY;
		  		drag.hasMoved = drag.hasMoved || hasDragMoved(drag, event);
		  		fallbackDrag = null;
		  		setTimeout(function() {
		  			removeDragPreview(drag);
		  			if (drag.hasMoved && getWorkspaceBlockCount() == drag.blockCountBefore) {
		  				cloneFlyoutBlock(drag.flyoutBlock, drag.lastX, drag.lastY, drag.offsetX, drag.offsetY);
		  			}
		  		}, 100);
		  	}, true);
		  }

      function canUseStorage(storage) {
        try {
          var testKey = 'juma.r2rml.storage.test';
          storage.setItem(testKey, testKey);
          storage.removeItem(testKey);
          return true;
        } catch (e) {
          return false;
        }
      }

      function getStorageValue(storage, key) {
        if (!canUseStorage(storage)) {
          return null;
        }
        return storage.getItem(key);
      }

      function setStorageValue(storage, key, value) {
        if (!canUseStorage(storage)) {
          return;
        }
        storage.setItem(key, value);
      }

      function removeStorageValue(storage, key) {
        if (!canUseStorage(storage)) {
          return;
        }
        storage.removeItem(key);
      }

      function getSessionValue(key) {
        return getStorageValue(sessionStorage, key);
      }

      function setSessionValue(key, value) {
        setStorageValue(sessionStorage, key, value);
      }

      function removeSessionValue(key) {
        removeStorageValue(sessionStorage, key);
      }

      function getPersistentValue(key) {
        var sessionValue = getSessionValue(key);
        if (sessionValue != null) {
          return sessionValue;
        }
        return getStorageValue(localStorage, key);
      }

      function setPersistentValue(key, value) {
        setSessionValue(key, value);
        setStorageValue(localStorage, key, value);
      }

      function removePersistentValue(key) {
        removeSessionValue(key);
        removeStorageValue(localStorage, key);
      }

      function setStorageStatus(message) {
        $('#storageStatus').text(message || '');
      }

      function workspaceToXmlText() {
        var xml = Blockly.Xml.workspaceToDom(workspace);
        return Blockly.Xml.domToText(xml);
      }

      function resizeWorkspace() {
        Blockly.svgResize(workspace);
        if (workspace.resize) {
          workspace.resize();
        }
      }

      function scheduleWorkspaceResize() {
        resizeWorkspace();
        setTimeout(resizeWorkspace, 80);
        setTimeout(resizeWorkspace, 250);
      }

      function fitWorkspaceToBlocks() {
        resizeWorkspace();
        if (getWorkspaceBlockCount() > 1 && workspace.zoomToFit) {
          workspace.zoomToFit();
          if (workspace.scale > 1) {
            workspace.setScale(1);
            workspace.scrollCenter();
          }
        } else if (workspace.scrollCenter) {
          workspace.scrollCenter();
        }
        resizeWorkspace();
      }

      function centerWorkspaceView() {
        resizeWorkspace();
        if (workspace.scrollCenter) {
          workspace.scrollCenter();
        }
      }

      function zoomWorkspace(direction) {
        resizeWorkspace();
        var metrics = workspace.getMetrics();
        if (metrics && workspace.zoom) {
          workspace.zoom(metrics.viewWidth / 2, metrics.viewHeight / 2, direction);
        } else if (workspace.zoomCenter) {
          workspace.zoomCenter(direction);
        }
        resizeWorkspace();
      }

      function installWorkspaceResizeHooks() {
        $(window).on('resize', scheduleWorkspaceResize);
        if (window.MutationObserver) {
          var editPanel = document.getElementById('edit');
          var observer = new MutationObserver(scheduleWorkspaceResize);
          observer.observe(editPanel, {attributes: true, attributeFilter: ['style', 'class']});
        }
      }

      function persistDraftState(force) {
        if (!force && !autosaveEnabled) {
          return;
        }
        setPersistentValue(STORAGE_KEYS.draftXml, workspaceToXmlText());
        setPersistentValue(STORAGE_KEYS.code, document.getElementById('code').value || '');
      }

      function loadStartWorkspace() {
        isRestoringWorkspace = true;
        Blockly.Events.disable();
        try {
          workspace.clear();
          Blockly.Xml.domToWorkspace(document.getElementById('startBlocks'), workspace);
        } finally {
          Blockly.Events.enable();
          isRestoringWorkspace = false;
        }
        resizeWorkspace();
        generateCode();
      }

      function loadWorkspaceXmlText(xmlText) {
        isRestoringWorkspace = true;
        Blockly.Events.disable();
        try {
          workspace.clear();
          Blockly.Xml.domToWorkspace(Blockly.Xml.textToDom(xmlText), workspace);
        } finally {
          Blockly.Events.enable();
          isRestoringWorkspace = false;
        }
        resizeWorkspace();
        generateCode();
      }

      function saveWorkspaceState() {
        var xmlText = workspaceToXmlText();
        setPersistentValue(STORAGE_KEYS.savedXml, xmlText);
        setPersistentValue(STORAGE_KEYS.draftXml, xmlText);
        setPersistentValue(STORAGE_KEYS.code, document.getElementById('code').value || '');
        setStorageStatus('Saved');
      }

      function undoWorkspaceToSavedState() {
        var savedXml = getPersistentValue(STORAGE_KEYS.savedXml);
        if (!savedXml) {
          alert('No saved state found.');
          return;
        }
        loadWorkspaceXmlText(savedXml);
        persistDraftState(true);
        setStorageStatus('Restored saved state');
      }

      function clearWorkspaceState() {
        if (!confirm('Clear current project?')) {
          return;
        }
        removePersistentValue(STORAGE_KEYS.draftXml);
        removePersistentValue(STORAGE_KEYS.savedXml);
        removePersistentValue(STORAGE_KEYS.code);
        loadStartWorkspace();
        persistDraftState(true);
        setStorageStatus('Cleared');
      }

      function initializeWorkspacePersistence() {
        var storedAutosave = getPersistentValue(STORAGE_KEYS.autosave);
        autosaveEnabled = storedAutosave !== 'false';
        $('#autosaveToggle').prop('checked', autosaveEnabled);
      }

      function loadInitialWorkspace() {
        var xmlText = getPersistentValue(STORAGE_KEYS.draftXml) || getPersistentValue(STORAGE_KEYS.savedXml);
        if (xmlText) {
          try {
            loadWorkspaceXmlText(xmlText);
            setStorageStatus('Saved state restored');
            return;
          } catch (e) {
            removePersistentValue(STORAGE_KEYS.draftXml);
            removePersistentValue(STORAGE_KEYS.savedXml);
          }
        }
        loadStartWorkspace();
        persistDraftState(true);
      }

      function escapeRegex(text) {
        return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      }

      function unquoteTurtleString(value) {
        if (!value) {
          return '';
        }
        return value.replace(/\\"/g, '"').replace(/\\\\/g, '\\');
      }

      function matchQuotedProperty(text, propertyName) {
        var re = new RegExp(escapeRegex(propertyName) + '\\s+(?:"""([\\s\\S]*?)"""|"((?:\\\\.|[^"])*)")\\s*;', 'i');
        var match = text.match(re);
        if (!match) {
          return null;
        }
        return unquoteTurtleString(match[1] != null ? match[1] : match[2]);
      }

      function matchPlainProperty(text, propertyName) {
        var re = new RegExp(escapeRegex(propertyName) + '\\s+([^;]+)\\s*;', 'i');
        var match = text.match(re);
        return match ? match[1].replace(/^\s+|\s+$/g, '') : null;
      }

      function findMatchingBracket(text, openIndex) {
        var depth = 0;
        var quoteMode = null;
        for (var i = openIndex; i < text.length; i++) {
          var chunk = text.substring(i, i + 3);
          var ch = text.charAt(i);
          if (quoteMode == 'triple') {
            if (chunk == '"""') {
              quoteMode = null;
              i += 2;
            }
            continue;
          }
          if (quoteMode == 'double') {
            if (ch == '\\') {
              i++;
            } else if (ch == '"') {
              quoteMode = null;
            }
            continue;
          }
          if (chunk == '"""') {
            quoteMode = 'triple';
            i += 2;
            continue;
          }
          if (ch == '"') {
            quoteMode = 'double';
            continue;
          }
          if (ch == '[') {
            depth++;
          } else if (ch == ']') {
            depth--;
            if (depth == 0) {
              return i;
            }
          }
        }
        return -1;
      }

      function extractBracketBlocks(text, propertyName) {
        var blocks = [];
        var searchIndex = 0;
        var marker = propertyName + ' [';
        while (searchIndex < text.length) {
          var start = text.indexOf(marker, searchIndex);
          if (start == -1) {
            break;
          }
          var openIndex = text.indexOf('[', start);
          var closeIndex = findMatchingBracket(text, openIndex);
          if (openIndex == -1 || closeIndex == -1) {
            break;
          }
          blocks.push({
            content: text.substring(openIndex + 1, closeIndex),
            start: start,
            end: closeIndex + 1
          });
          searchIndex = closeIndex + 1;
        }
        return blocks;
      }

      function parseTermMap(text) {
        var constant = text.match(/rr:constant\s+([^;]+)\s*;/i);
        if (constant) {
          return {kind: 'CONSTANT', value: constant[1].replace(/^\s+|\s+$/g, '')};
        }
        var template = matchQuotedProperty(text, 'rr:template');
        if (template != null) {
          return {kind: 'TEMPLATE', value: template};
        }
        var column = matchQuotedProperty(text, 'rr:column');
        if (column != null) {
          return {kind: 'COLUMN', value: column};
        }
        return null;
      }

      function parseTermType(text) {
        var match = text.match(/rr:termType\s+rr:(IRI|BlankNode|Literal)\s*;/i);
        if (!match) {
          return null;
        }
        var termType = match[1].toLowerCase();
        if (termType == 'iri') {
          return 'termtypeiri';
        }
        if (termType == 'blanknode') {
          return 'termtypeblanknode';
        }
        return 'termtypeliteral';
      }

      function parseGraphMap(text) {
        return {termMap: parseTermMap(text)};
      }

      function parseJoinCondition(text) {
        return {
          child: matchQuotedProperty(text, 'rr:child') || '',
          parent: matchQuotedProperty(text, 'rr:parent') || ''
        };
      }

      function parseLogicalTable(text) {
        var tableName = matchQuotedProperty(text, 'rr:tableName');
        if (tableName != null) {
          return {type: 'table', value: tableName};
        }
        var sqlQuery = matchQuotedProperty(text, 'rr:sqlQuery');
        if (sqlQuery != null) {
          return {type: 'sqlquery', value: sqlQuery};
        }
        return null;
      }

      function parseSubjectMap(text) {
        var classes = [];
        var classRe = /rr:class\s+([^;]+)\s*;/ig;
        var classMatch;
        while ((classMatch = classRe.exec(text)) != null) {
          classes.push(classMatch[1].replace(/^\s+|\s+$/g, ''));
        }
        var graphBlocks = extractBracketBlocks(text, 'rr:graphMap');
        var graphMaps = [];
        for (var i = 0; i < graphBlocks.length; i++) {
          graphMaps.push(parseGraphMap(graphBlocks[i].content));
        }
        return {
          termMap: parseTermMap(text),
          classes: classes,
          termType: parseTermType(text),
          graphMaps: graphMaps
        };
      }

      function parsePredicateMap(text) {
        return {
          termMap: parseTermMap(text),
          termType: parseTermType(text)
        };
      }

      function parseObjectMap(text) {
        var parentMatch = text.match(/rr:parentTriplesMap\s+<#([^>]+)>\s*;/i);
        if (parentMatch) {
          var joinBlocks = extractBracketBlocks(text, 'rr:joinCondition');
          var joinConditions = [];
          for (var i = 0; i < joinBlocks.length; i++) {
            joinConditions.push(parseJoinCondition(joinBlocks[i].content));
          }
          return {
            type: 'parenttriplesmap',
            parentTriplesMap: parentMatch[1],
            joinConditions: joinConditions
          };
        }

        var termType = parseTermType(text);
        return {
          type: 'objectmap',
          termMap: parseTermMap(text),
          termType: termType,
          literalDatatype: termType == 'termtypeliteral' ? matchPlainProperty(text, 'rr:datatype') : null,
          literalLanguage: termType == 'termtypeliteral' ? matchQuotedProperty(text, 'rr:language') : null,
          datatype: termType == 'termtypeliteral' ? null : matchPlainProperty(text, 'rr:datatype'),
          language: termType == 'termtypeliteral' ? null : matchQuotedProperty(text, 'rr:language'),
          inverseExpression: matchQuotedProperty(text, 'rr:inverseExpression')
        };
      }

      function parsePredicateObjectMap(text) {
        var predicateBlocks = extractBracketBlocks(text, 'rr:predicateMap');
        var objectBlocks = extractBracketBlocks(text, 'rr:objectMap');
        var graphBlocks = extractBracketBlocks(text, 'rr:graphMap');
        var predicateMaps = [];
        var objectMaps = [];
        var graphMaps = [];
        for (var i = 0; i < predicateBlocks.length; i++) {
          predicateMaps.push(parsePredicateMap(predicateBlocks[i].content));
        }
        for (var j = 0; j < objectBlocks.length; j++) {
          objectMaps.push(parseObjectMap(objectBlocks[j].content));
        }
        for (var k = 0; k < graphBlocks.length; k++) {
          graphMaps.push(parseGraphMap(graphBlocks[k].content));
        }
        return {
          predicateMaps: predicateMaps,
          objectMaps: objectMaps,
          graphMaps: graphMaps
        };
      }

      function parseHeaderItems(text) {
        var firstTripleMap = text.search(/^\s*<#/m);
        var header = firstTripleMap == -1 ? text : text.substring(0, firstTripleMap);
        var items = [];
        var lineRe = /^\s*@(prefix|base)\s+([^\n\r]+?)\s*\.\s*$/img;
        var match;
        while ((match = lineRe.exec(header)) != null) {
          if (match[1].toLowerCase() == 'base') {
            var baseMatch = match[2].match(/^<([^>]+)>$/);
            if (baseMatch) {
              items.push({type: 'base', uri: baseMatch[1]});
            }
            continue;
          }
          var prefixMatch = match[2].match(/^([A-Za-z][\w-]*):\s*<([^>]+)>$/);
          if (prefixMatch && prefixMatch[1] != 'rr') {
            items.push({type: 'prefix', prefix: prefixMatch[1], uri: prefixMatch[2]});
          }
        }
        return items;
      }

      function parseTripleMaps(text) {
        var maps = [];
        var tripleMapRe = /^\s*<#([^>]+)>\s*$/gim;
        var starts = [];
        var match;
        while ((match = tripleMapRe.exec(text)) != null) {
          starts.push({
            name: match[1],
            bodyStart: tripleMapRe.lastIndex
          });
        }
        for (var mapIndex = 0; mapIndex < starts.length; mapIndex++) {
          var bodyEnd = mapIndex + 1 < starts.length ? starts[mapIndex + 1].bodyStart : text.length;
          var body = text.substring(starts[mapIndex].bodyStart, bodyEnd);
          var logicalBlocks = extractBracketBlocks(body, 'rr:logicalTable');
          var subjectBlocks = extractBracketBlocks(body, 'rr:subjectMap');
          var predicateObjectBlocks = extractBracketBlocks(body, 'rr:predicateObjectMap');
          var predicateObjectMaps = [];
          for (var i = 0; i < predicateObjectBlocks.length; i++) {
            predicateObjectMaps.push(parsePredicateObjectMap(predicateObjectBlocks[i].content));
          }
          maps.push({
            name: starts[mapIndex].name,
            logicalTable: logicalBlocks.length ? parseLogicalTable(logicalBlocks[0].content) : null,
            subjectMap: subjectBlocks.length ? parseSubjectMap(subjectBlocks[0].content) : null,
            predicateObjectMaps: predicateObjectMaps
          });
        }
        return maps;
      }

      function parseJumaTtl(text) {
        var ttl = (text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        return {
          headerItems: parseHeaderItems(ttl),
          tripleMaps: parseTripleMaps(ttl)
        };
      }

      function createWorkspaceBlock(type) {
        var block = workspace.newBlock(type);
        block.initSvg();
        block.render(false);
        return block;
      }

      function setFieldIfPresent(block, fieldName, value) {
        if (value != null && block.getField(fieldName)) {
          block.setFieldValue(value, fieldName);
        }
      }

      function applyTermMap(block, termMap) {
        if (!termMap) {
          return;
        }
        setFieldIfPresent(block, 'TERMMAP', termMap.kind);
        setFieldIfPresent(block, 'TERMMAPVALUE', termMap.value);
      }

      function applyLogicalTable(parentBlock, logicalTable) {
        if (!logicalTable) {
          return;
        }
        var block = createWorkspaceBlock('tablesqlquery');
        block.setFieldValue(logicalTable.type, 'TABLESQLQUERY');
        block.sql = logicalTable.value;
        block.setFieldValue(logicalTable.value.substring(0, 20) + (logicalTable.value.length > 20 ? '...' : ''), 'sql');
        appendToStatementInput(parentBlock, 'logicaltable', block);
      }

      function applyGraphMap(parentBlock, inputName, blockType, graphMap) {
        if (!graphMap || !graphMap.termMap) {
          return;
        }
        var block = createWorkspaceBlock(blockType);
        applyTermMap(block, graphMap.termMap);
        appendToStatementInput(parentBlock, inputName, block);
      }

      function applySubjectMap(parentBlock, subjectMap) {
        if (!subjectMap) {
          return;
        }
        var subjectBlock = createWorkspaceBlock('subjectmap');
        applyTermMap(subjectBlock, subjectMap.termMap);
        appendToStatementInput(parentBlock, 'subjectmap', subjectBlock);
        for (var i = 0; i < subjectMap.classes.length; i++) {
          var classBlock = createWorkspaceBlock('class');
          setFieldIfPresent(classBlock, 'CLASS', subjectMap.classes[i]);
          appendToStatementInput(subjectBlock, 'termmap', classBlock);
        }
        if (subjectMap.termType) {
          var termTypeBlock = createWorkspaceBlock('subjecttermtype');
          setFieldIfPresent(termTypeBlock, 'TERMTYPE', subjectMap.termType);
          appendToStatementInput(subjectBlock, 'termmap', termTypeBlock);
        }
        for (var j = 0; j < subjectMap.graphMaps.length; j++) {
          applyGraphMap(subjectBlock, 'termmap', 'subjectgraphtermap', subjectMap.graphMaps[j]);
        }
      }

      function applyPredicateMap(parentBlock, predicateMap) {
        var block = createWorkspaceBlock('predicatemap');
        applyTermMap(block, predicateMap.termMap);
        appendToStatementInput(parentBlock, 'ppredicateobjectmap', block);
        if (predicateMap.termType) {
          var termTypeBlock = createWorkspaceBlock('predicatetermtype');
          setFieldIfPresent(termTypeBlock, 'TERMTYPE', predicateMap.termType);
          appendToStatementInput(block, 'termmap', termTypeBlock);
        }
      }

      function applyObjectMap(parentBlock, objectMap) {
        if (objectMap.type == 'parenttriplesmap') {
          var parentTripleBlock = createWorkspaceBlock('parenttriplesmap');
          setFieldIfPresent(parentTripleBlock, 'PARENTTRIPLEMAP', objectMap.parentTriplesMap);
          appendToStatementInput(parentBlock, 'opredicateobjectmap', parentTripleBlock);
          for (var i = 0; i < objectMap.joinConditions.length; i++) {
            var joinBlock = createWorkspaceBlock('joincondition');
            setFieldIfPresent(joinBlock, 'CHILD', objectMap.joinConditions[i].child);
            setFieldIfPresent(joinBlock, 'PARENT', objectMap.joinConditions[i].parent);
            appendToStatementInput(parentTripleBlock, 'joincondition', joinBlock);
          }
          return;
        }

        var block = createWorkspaceBlock('objectmap');
        applyTermMap(block, objectMap.termMap);
        appendToStatementInput(parentBlock, 'opredicateobjectmap', block);
        if (objectMap.termType) {
          var termTypeBlock = createWorkspaceBlock('objecttermtype');
          setFieldIfPresent(termTypeBlock, 'TERMTYPE', objectMap.termType);
          appendToStatementInput(block, 'termmap', termTypeBlock);
          if (objectMap.termType == 'termtypeliteral') {
            if (objectMap.literalDatatype) {
              var datatypeValueBlock = createWorkspaceBlock('objectdatatype');
              setFieldIfPresent(datatypeValueBlock, 'DATATYPE', objectMap.literalDatatype);
              connectToValueInput(termTypeBlock, 'termtypevalue', datatypeValueBlock);
            } else if (objectMap.literalLanguage) {
              var languageValueBlock = createWorkspaceBlock('objectlanguage');
              setFieldIfPresent(languageValueBlock, 'LANGUAGE', objectMap.literalLanguage);
              connectToValueInput(termTypeBlock, 'termtypevalue', languageValueBlock);
            }
          }
        }
        if (objectMap.datatype) {
          var datatypeBlock = createWorkspaceBlock('datatype');
          setFieldIfPresent(datatypeBlock, 'DATATYPE', objectMap.datatype);
          appendToStatementInput(block, 'termmap', datatypeBlock);
        }
        if (objectMap.language) {
          var languageBlock = createWorkspaceBlock('language');
          setFieldIfPresent(languageBlock, 'LANGUAGE', objectMap.language);
          appendToStatementInput(block, 'termmap', languageBlock);
        }
        if (objectMap.inverseExpression) {
          var inverseBlock = createWorkspaceBlock('inverseexpression');
          setFieldIfPresent(inverseBlock, 'INVERSEEXPRESSION', objectMap.inverseExpression);
          appendToStatementInput(block, 'termmap', inverseBlock);
        }
      }

      function applyPredicateObjectMap(parentBlock, predicateObjectMap) {
        var block = createWorkspaceBlock('predicateobjectmap');
        appendToStatementInput(parentBlock, 'predicateobjectmap', block);
        for (var i = 0; i < predicateObjectMap.predicateMaps.length; i++) {
          applyPredicateMap(block, predicateObjectMap.predicateMaps[i]);
        }
        for (var j = 0; j < predicateObjectMap.objectMaps.length; j++) {
          applyObjectMap(block, predicateObjectMap.objectMaps[j]);
        }
        for (var k = 0; k < predicateObjectMap.graphMaps.length; k++) {
          applyGraphMap(block, 'graphmap', 'predicategraphtermap', predicateObjectMap.graphMaps[k]);
        }
      }

      function isPredefinedVocab(prefix, uri) {
        var value = prefix + ': <' + uri + '>';
        for (var i = 0; i < vocabs.length; i++) {
          if (vocabs[i][1] == value) {
            return value;
          }
        }
        return null;
      }

      function applyHeaderItem(mappingBlock, item) {
        if (item.type == 'base') {
          var baseBlock = createWorkspaceBlock('base');
          setFieldIfPresent(baseBlock, 'URI', item.uri);
          appendToStatementInput(mappingBlock, 'mapping', baseBlock);
          return;
        }
        var predefinedValue = isPredefinedVocab(item.prefix, item.uri);
        if (predefinedValue) {
          var predefinedBlock = createWorkspaceBlock('predefinedprefix');
          setFieldIfPresent(predefinedBlock, 'PREFIX', predefinedValue);
          appendToStatementInput(mappingBlock, 'mapping', predefinedBlock);
          return;
        }
        var prefixBlock = createWorkspaceBlock('prefix');
        setFieldIfPresent(prefixBlock, 'PREFIX', item.prefix);
        setFieldIfPresent(prefixBlock, 'URI', item.uri);
        appendToStatementInput(mappingBlock, 'mapping', prefixBlock);
      }

      function applyParsedTtlModel(model) {
        isRestoringWorkspace = true;
        Blockly.Events.disable();
        try {
          workspace.clear();
          Blockly.Xml.domToWorkspace(document.getElementById('startBlocks'), workspace);
          var mappingBlock = getBlocksByType('mapping')[0];
          for (var i = 0; i < model.headerItems.length; i++) {
            applyHeaderItem(mappingBlock, model.headerItems[i]);
          }
          var tripleBlocks = [];
          for (var j = 0; j < model.tripleMaps.length; j++) {
            var tripleBlock = createWorkspaceBlock('triplemap');
            setFieldIfPresent(tripleBlock, 'TRIPLEMAPNAME', model.tripleMaps[j].name);
            appendToStatementInput(mappingBlock, 'triplesmap', tripleBlock);
            tripleBlocks.push(tripleBlock);
          }
          for (var k = 0; k < model.tripleMaps.length; k++) {
            applyLogicalTable(tripleBlocks[k], model.tripleMaps[k].logicalTable);
            applySubjectMap(tripleBlocks[k], model.tripleMaps[k].subjectMap);
            for (var p = 0; p < model.tripleMaps[k].predicateObjectMaps.length; p++) {
              applyPredicateObjectMap(tripleBlocks[k], model.tripleMaps[k].predicateObjectMaps[p]);
            }
          }
        } finally {
          Blockly.Events.enable();
          isRestoringWorkspace = false;
        }
        resizeWorkspace();
        generateCode();
      }

      function importTtlText(ttlText) {
        var model = parseJumaTtl(ttlText);
        if (!model.headerItems.length && !model.tripleMaps.length) {
          alert('No Juma R2RML content was found in this TTL file.');
          return;
        }
        applyParsedTtlModel(model);
        persistDraftState(true);
        setStorageStatus('TTL loaded');
      }

      function loadTtlFile(file) {
        if (!file) {
          return;
        }
        var reader = new FileReader();
        reader.onload = function(event) {
          try {
            importTtlText(event.target.result);
          } catch (e) {
            alert('Could not load this TTL file.');
          }
          $('#loadTtlFile').val('');
        };
        reader.readAsText(file);
      }

      function generateCode(event) {
        var code = R2RML.workspaceToCode(workspace);
        document.getElementById('code').value = code;
        if (!isRestoringWorkspace) {
          persistDraftState(false);
        }
		  }

		  function getExportFileName() {
		  	var fileName = ($('#exportFileName').val() || '').replace(/^\s+|\s+$/g, '');
		  	if (!fileName) {
		  		alert('Enter a file name before exporting.');
		  		$('#exportFileName').focus();
		  		return null;
		  	}

		  	fileName = fileName.replace(/[\\\/:*?"<>|]+/g, '_')
		  		.replace(/^\.+/, '')
		  		.replace(/\.+$/, '');
		  	if (!fileName) {
		  		alert('Enter a valid file name before exporting.');
		  		$('#exportFileName').focus();
		  		return null;
		  	}

		  	if (!/\.ttl$/i.test(fileName)) {
		  		fileName += '.ttl';
		  	}
		  	return fileName;
		  }

		  function exportGeneratedR2RML() {
		  	generateCode();
		  	var fileName = getExportFileName();
		  	if (!fileName) {
		  		return;
		  	}

		  	var code = document.getElementById('code').value;
		  	var blob = new Blob([code], {type: 'text/turtle;charset=utf-8'});
		  	if (window.navigator && window.navigator.msSaveOrOpenBlob) {
		  		window.navigator.msSaveOrOpenBlob(blob, fileName);
		  		return;
		  	}

		  	var url = window.URL.createObjectURL(blob);
		  	var link = document.createElement('a');
		  	link.href = url;
		  	link.download = fileName;
		  	document.body.appendChild(link);
		  	link.click();
		  	document.body.removeChild(link);
		  	setTimeout(function() {
		  		window.URL.revokeObjectURL(url);
		  	}, 0);
		  }
		  
		  initializeWorkspacePersistence();
		  installFlyoutBlockFallback();
      installWorkspaceResizeHooks();
		  workspace.addChangeListener(placeCreatedBlock);
		  workspace.addChangeListener(generateCode);

      $('#loadTtlButton').on('click', function() {
        $('#loadTtlFile').click();
      });
      $('#loadTtlFile').on('change', function(event) {
        loadTtlFile(event.target.files && event.target.files[0]);
      });
      $('#saveWorkspace').on('click', saveWorkspaceState);
      $('#undoWorkspace').on('click', undoWorkspaceToSavedState);
      $('#clearWorkspace').on('click', clearWorkspaceState);
      $('#fitWorkspace').on('click', fitWorkspaceToBlocks);
      $('#centerWorkspace').on('click', centerWorkspaceView);
      $('#zoomOutWorkspace').on('click', function() {
        zoomWorkspace(-1);
      });
      $('#zoomInWorkspace').on('click', function() {
        zoomWorkspace(1);
      });
      $('#autosaveToggle').on('change', function() {
        autosaveEnabled = this.checked;
        setPersistentValue(STORAGE_KEYS.autosave, autosaveEnabled ? 'true' : 'false');
        if (autosaveEnabled) {
          persistDraftState(true);
          setStorageStatus('Autosave on');
        } else {
          setStorageStatus('Autosave off');
        }
		  });
		  $('#exportR2RML').on('click', exportGeneratedR2RML);
		  $('#exportFileName').on('keydown', function(event) {
		  	if (event.keyCode == 13) {
		  		event.preventDefault();
		  		exportGeneratedR2RML();
		  	}
		  });
		  loadInitialWorkspace();
      scheduleWorkspaceResize();

		  $('.nav-tabs a').on('click', function(event){
				var x = $(event.target).text();         // active tab
				if(x != 'Mapping') {
					$('.blocklyToolboxDiv').hide();
				} else {
					$('.blocklyToolboxDiv').show();
          scheduleWorkspaceResize();
				}
			});
		</script>

	</body>
